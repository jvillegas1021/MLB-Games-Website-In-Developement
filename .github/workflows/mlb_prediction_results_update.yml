name: Run MLB Prediction Results Update (R)

on:
  schedule:
    - cron: "00 14 * * *"   # 10:00 AM Eastern (10:00 UTC)
  workflow_dispatch:

jobs:
  run-r--mlb-games-prediction-results-update:
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("tidyverse", "DBI", "RPostgres"))'

      - name: Run MLB Prediction Results Update
        run: Rscript backend/r_pipelines/scripts/update_mlb_games_prediction_results_script.r
